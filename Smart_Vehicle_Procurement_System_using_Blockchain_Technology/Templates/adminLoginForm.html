<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Smart Vehicle Procurement</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
    }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    body {
      background: linear-gradient(-45deg, #0a0a0a, #1a0a0a, #0a0a1a, #0f0a1a, #1a0510);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      min-height: 100vh;
    }
    .glass-card {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .glass-input {
      background: rgba(255,255,255,0.06) !important;
      border: 1px solid rgba(255,255,255,0.1);
      color: white !important;
      transition: all 0.3s ease;
    }
    .glass-input:focus {
      background: rgba(255,255,255,0.1) !important;
      border-color: rgba(239, 68, 68, 0.5) !important;
      outline: none;
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
    }
    .glass-input::placeholder { color: rgba(255,255,255,0.3); }
    .btn-admin {
      background: linear-gradient(135deg, #dc2626, #991b1b);
      transition: all 0.3s ease;
    }
    .btn-admin:hover {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(220, 38, 38, 0.4);
    }
    .glass-nav { background: rgba(255,255,255,0.02); border-bottom: 1px solid rgba(255,255,255,0.05); }
    .glass-btn { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); transition: all 0.3s; }
    .glass-btn:hover { background: rgba(255,255,255,0.14); }
    .floating-orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.12; animation: float 8s ease-in-out infinite; pointer-events: none; z-index: 0; }
    .form-card { animation: fadeSlideIn 0.7s ease-out; }
    .orb1 { width: 350px; height: 350px; background: #dc2626; top: -80px; right: -80px; }
    .orb2 { width: 250px; height: 250px; background: #7c3aed; bottom: -60px; left: -60px; animation-delay: 4s; }
  </style>
</head>
<body class="flex flex-col min-h-screen text-white">
  <div class="floating-orb orb1"></div>
  <div class="floating-orb orb2"></div>

  <nav class="glass-nav py-4 px-6 flex justify-between items-center relative z-10">
    <a href="/" class="flex items-center space-x-2 font-bold text-xl">
      <span>🚗</span><span>SmartVehicle</span>
    </a>
    <div class="space-x-3">
      <a href="/" class="glass-btn text-white py-2 px-5 rounded-full text-base font-semibold md:text-lg">Home</a>
      <a href="userLoginForm" class="glass-btn text-white py-2 px-5 rounded-full text-base font-semibold md:text-lg">User Login</a>
    </div>
  </nav>

  <div class="flex flex-1 items-center justify-center relative z-10 py-12 px-4">
    <div class="glass-card rounded-2xl p-10 w-full max-w-md form-card">
      <div class="text-center mb-8">
        <div class="w-16 h-16 mx-auto mb-4 rounded-full flex items-center justify-center" style="background: rgba(220,38,38,0.2); border: 1px solid rgba(220,38,38,0.4);">
          <span class="text-2xl">🛡️</span>
        </div>
        <h2 class="text-3xl font-bold text-white">Admin Portal</h2>
        <p class="text-gray-400 mt-1 text-sm">Authorized access only</p>
      </div>

      {% if messages %}
      {% for message in messages %}
      <div class="mb-4 p-3 rounded-lg bg-red-900 bg-opacity-50 border border-red-700 text-red-300 text-sm">{{ message }}</div>
      {% endfor %}
      {% endif %}

      <form method="post" action="adminLoginCheck">
        {% csrf_token %}
        <div class="mb-5">
          <label class="block text-red-400 text-sm font-medium mb-2">Admin Username</label>
          <input type="text" name="loginid" placeholder="Enter admin username"
            class="glass-input w-full px-4 py-3 rounded-xl text-white" required>
        </div>
        <div class="mb-6">
          <label class="block text-orange-400 text-sm font-medium mb-2">Password</label>
          <input type="password" name="password" placeholder="Enter password"
            class="glass-input w-full px-4 py-3 rounded-xl text-white" required>
        </div>
        <button type="submit" class="btn-admin w-full py-3 text-white font-semibold rounded-xl">
          Access Admin Panel →
        </button>
      </form>

      <p class="text-center text-gray-500 mt-6 text-xs">🔒 This portal is for authorized administrators only</p>
    </div>
  </div>
</body>
</html>
