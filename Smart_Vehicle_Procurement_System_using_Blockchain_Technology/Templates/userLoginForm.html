<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Smart Vehicle Procurement</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { font-family: 'Inter', sans-serif; }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
    }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse-ring {
      0% { transform: scale(0.8); opacity: 1; }
      100% { transform: scale(2); opacity: 0; }
    }

    body {
      background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #0f0c29, #1a1a2e, #16213e);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      min-height: 100vh;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .glass-input {
      background: rgba(255, 255, 255, 0.07) !important;
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: white !important;
      transition: all 0.3s ease;
    }
    .glass-input:focus {
      background: rgba(255, 255, 255, 0.12) !important;
      border-color: rgba(99, 102, 241, 0.7) !important;
      outline: none;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }
    .glass-input::placeholder { color: rgba(255,255,255,0.4); }

    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      transition: all 0.3s ease;
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
    }

    .glass-nav {
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .glass-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      transition: all 0.3s;
    }
    .glass-btn:hover {
      background: rgba(255,255,255,0.16);
      transform: translateY(-1px);
    }

    .floating-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      animation: float 8s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }

    .form-card {
      animation: fadeSlideIn 0.7s ease-out;
    }

    /* Decorative blobs */
    .orb1 { width: 400px; height: 400px; background: #6366f1; top: -100px; left: -100px; animation-delay: 0s; }
    .orb2 { width: 300px; height: 300px; background: #8b5cf6; bottom: -50px; right: -50px; animation-delay: 3s; }
    .orb3 { width: 200px; height: 200px; background: #06b6d4; top: 50%; left: 50%; animation-delay: 6s; }
  </style>
</head>
<body class="flex flex-col min-h-screen">
  <!-- Floating orbs for premium feel -->
  <div class="floating-orb orb1"></div>
  <div class="floating-orb orb2"></div>
  <div class="floating-orb orb3"></div>

  <!-- Minimal Navbar -->
  <nav class="glass-nav py-4 px-6 flex justify-between items-center relative z-10">
    <a href="/" class="flex items-center space-x-2 text-white font-bold text-xl">
      <img src="https://img.icons8.com/fluency/48/ffffff/sports-car.png" class="w-8 h-8">
      <span>SmartVehicle</span>
    </a>
    <div class="space-x-3">
      <a href="/" class="glass-btn text-white py-2 px-5 rounded-full text-base font-semibold md:text-lg">Home</a>
      <a href="userLoginForm" class="glass-btn text-indigo-300 py-2 px-4 rounded-full text-base font-medium border-indigo-500">Login</a>
      <a href="userRegisterForm" class="glass-btn text-white py-2 px-5 rounded-full text-base font-semibold md:text-lg">Register</a>
      <a href="adminLoginForm" class="glass-btn text-white py-2 px-5 rounded-full text-base font-semibold md:text-lg">Admin</a>
    </div>
  </nav>

  <!-- Login Form -->
  <div class="flex flex-1 items-center justify-center relative z-10 py-12 px-4">
    <div class="glass-card rounded-2xl p-10 w-full max-w-md form-card">

      <!-- Logo + Heading -->
      <div class="text-center mb-8">
        <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-indigo-600 bg-opacity-30 flex items-center justify-center border border-indigo-500 border-opacity-40">
          <img src="https://img.icons8.com/fluency/48/ffffff/lock.png" class="w-8 h-8">
        </div>
        <h2 class="text-3xl font-bold text-white">Welcome Back</h2>
        <p class="text-gray-400 mt-1 text-sm">Login to your account</p>
      </div>

      <!-- Messages -->
      {% if messages %}
      {% for message in messages %}
      <div class="mb-4 p-3 rounded-lg bg-red-900 bg-opacity-50 border border-red-700 text-red-300 text-sm">
        {{ message }}
      </div>
      {% endfor %}
      {% endif %}

      <form method="post" action="userLoginCheck">
        {% csrf_token %}
        <div class="mb-5">
          <label class="block text-indigo-400 text-sm font-medium mb-2">Login ID</label>
          <input type="text" name="loginid" placeholder="Enter your login ID"
            class="glass-input w-full px-4 py-3 rounded-xl text-white" required>
        </div>
        <div class="mb-6">
          <label class="block text-cyan-400 text-sm font-medium mb-2">Password</label>
          <input type="password" name="password" placeholder="Enter your password"
            class="glass-input w-full px-4 py-3 rounded-xl text-white" required>
        </div>
        <button type="submit" class="btn-primary w-full py-3 text-white font-semibold rounded-xl text-base">
          Login →
        </button>
      </form>

      <p class="text-center text-gray-400 mt-6 text-sm">
        Don't have an account?
        <a href="userRegisterForm" class="text-indigo-400 hover:text-indigo-300 font-medium">Register here</a>
      </p>
    </div>
  </div>
</body>
</html>
