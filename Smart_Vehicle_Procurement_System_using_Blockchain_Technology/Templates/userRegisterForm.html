<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Smart Vehicle Procurement</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { font-family: 'Inter', sans-serif; }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
    }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    body {
      background: linear-gradient(-45deg, #0f0c29, #302b63, #0f0c29, #1a1a2e, #16213e, #0d1117);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      min-height: 100vh;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .glass-input {
      background: rgba(255, 255, 255, 0.07) !important;
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: white !important;
      transition: all 0.3s ease;
    }
    .glass-input:focus {
      background: rgba(255, 255, 255, 0.12) !important;
      border-color: rgba(99, 102, 241, 0.7) !important;
      outline: none;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }
    .glass-input::placeholder { color: rgba(255,255,255,0.4); }
    .btn-primary {
      background: linear-gradient(135deg, #10b981, #059669);
      border: none;
      transition: all 0.3s ease;
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, #059669, #047857);
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(16, 185, 129, 0.4);
    }
    .glass-nav { background: rgba(255,255,255,0.03); border-bottom: 1px solid rgba(255,255,255,0.08); }
    .glass-btn { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); transition: all 0.3s; }
    .glass-btn:hover { background: rgba(255,255,255,0.16); transform: translateY(-1px); }
    .floating-orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.15; animation: float 8s ease-in-out infinite; pointer-events: none; z-index: 0; }
    .form-card { animation: fadeSlideIn 0.7s ease-out; }
    .orb1 { width: 400px; height: 400px; background: #10b981; top: -100px; right: -100px; animation-delay: 0s; }
    .orb2 { width: 300px; height: 300px; background: #6366f1; bottom: -50px; left: -50px; animation-delay: 3s; }
  </style>
</head>
<body class="flex flex-col min-h-screen">
  <div class="floating-orb orb1"></div>
  <div class="floating-orb orb2"></div>

  <!-- Minimal Navbar -->
  <nav class="glass-nav py-4 px-6 flex justify-between items-center relative z-10">
    <a href="/" class="flex items-center space-x-2 text-white font-bold text-xl">
      <img src="https://img.icons8.com/fluency/48/ffffff/sports-car.png" class="w-8 h-8">
      <span>SmartVehicle</span>
    </a>
    <div class="space-x-3">
      <a href="/" class="glass-btn text-white py-2 px-5 rounded-full text-base font-semibold md:text-lg">Home</a>
      <a href="userLoginForm" class="glass-btn text-white py-2 px-5 rounded-full text-base font-semibold md:text-lg">Login</a>
      <a href="userRegisterForm" class="glass-btn text-green-300 py-2 px-4 rounded-full text-base font-medium border-green-500">Register</a>
      <a href="adminLoginForm" class="glass-btn text-white py-2 px-5 rounded-full text-base font-semibold md:text-lg">Admin</a>
    </div>
  </nav>

  <!-- Register Form -->
  <div class="flex flex-1 items-center justify-center relative z-10 py-12 px-4">
    <div class="glass-card rounded-2xl p-10 w-full max-w-2xl form-card">

      <!-- Logo + Heading -->
      <div class="text-center mb-8">
        <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-green-600 bg-opacity-30 flex items-center justify-center border border-green-500 border-opacity-40">
          <img src="https://img.icons8.com/fluency/48/ffffff/add-user-male.png" class="w-8 h-8">
        </div>
        <h2 class="text-3xl font-bold text-white">Create Account</h2>
        <p class="text-gray-400 mt-1 text-sm">Join the blockchain vehicle marketplace</p>
      </div>

      <!-- Messages -->
      {% if messages %}
      {% for message in messages %}
      <div class="mb-4 p-3 rounded-lg bg-green-900 bg-opacity-50 border border-green-700 text-green-300 text-sm">
        {{ message }}
      </div>
      {% endfor %}
      {% endif %}

      <form method="post" action="userRegisterCheck">
        {% csrf_token %}
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
          <div>
            <label class="block text-indigo-400 text-lg font-medium mb-2">Full Name</label>
            <input type="text" name="name" maxlength="50" placeholder="Enter Full Name"
              class="glass-input w-full px-4 py-3 rounded-xl" required>
          </div>
          <div>
            <label class="block text-cyan-400 text-lg font-medium mb-2">Email</label>
            <input type="email" name="email" placeholder="Enter Email"
              class="glass-input w-full px-4 py-3 rounded-xl" required>
          </div>
          <div>
            <label class="block text-purple-400 text-lg font-medium mb-2">Login ID</label>
            <input type="text" name="loginid" maxlength="30" placeholder="Choose a Login ID"
              class="glass-input w-full px-4 py-3 rounded-xl" required>
          </div>
          <div>
            <label class="block text-green-400 text-lg font-medium mb-2">Mobile Number</label>
            <input type="text" name="mobile" maxlength="10" placeholder="10-digit Mobile Number"
              class="glass-input w-full px-4 py-3 rounded-xl" required>
          </div>
          <div class="md:col-span-2">
            <label class="block text-yellow-400 text-lg font-medium mb-2">Password</label>
            <input type="password" name="password" maxlength="128" placeholder="Create Password"
              class="glass-input w-full px-4 py-3 rounded-xl" required>
          </div>
        </div>
        <!-- Location with Live GPS -->
        <div class="mb-8">
          <label class="block text-pink-400 text-lg font-medium mb-2">📍 Location</label>
          <div class="flex items-center space-x-2">
            <input type="text" id="location" name="location" placeholder="Enter city or fetch live location"
              class="glass-input w-full px-4 py-3 rounded-xl" required>
            <button type="button" onclick="getLiveLocation()"
              class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-xl flex-shrink-0 transition">
              📍 Live
            </button>
          </div>
          <p id="location-status" class="text-xs text-yellow-400 mt-1 hidden"></p>
        </div>
        <button type="submit" class="btn-primary w-full py-4 text-white font-bold rounded-xl text-lg hover:shadow-lg transition-transform">
          Create Account →
        </button>
      </form>

      <p class="text-center text-gray-400 mt-6 text-sm">
        Already have an account?
        <a href="userLoginForm" class="text-green-400 hover:text-green-300 font-medium">Login here</a>
      </p>
    </div>
  </div>

  <script>
    async function getLiveLocation() {
      const locStatus = document.getElementById('location-status');
      const locInput = document.getElementById('location');
      if (navigator.geolocation) {
        locStatus.textContent = "📡 Fetching location...";
        locStatus.classList.remove('hidden');
        navigator.geolocation.getCurrentPosition(async (position) => {
          const lat = position.coords.latitude;
          const lon = position.coords.longitude;
          try {
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
            const data = await res.json();
            if (data && data.display_name) {
              locInput.value = data.display_name;
              locStatus.textContent = "✅ Location fetched!";
              locStatus.className = "text-xs mt-1 text-green-400";
            } else {
              locInput.value = `${lat}, ${lon}`;
            }
          } catch {
            locInput.value = `${lat}, ${lon}`;
          }
        }, () => {
          locStatus.textContent = "❌ Access denied. Type manually.";
          locStatus.className = "text-xs mt-1 text-red-400";
        });
      }
    }
  </script>
</body>
</html>
